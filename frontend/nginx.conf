# nginx.conf — served as /etc/nginx/templates/default.conf.template
#
# nginx's docker-entrypoint builds a filter from ALL defined env vars and
# calls:  envsubst "$defined_envs" < template > output
#
# When envsubst is given a specific filter list, $$ is NOT converted to $.
# Therefore nginx runtime variables MUST use plain $var (no braces, single $).
# envsubst leaves them untouched because e.g. "host" is not an env var name.
#
# Only two env vars are substituted intentionally:
#   ${PORT}        — set by Cloud Run (default 8080)
#   ${BACKEND_URL} — set via --set-env-vars in cloudbuild.yaml
#
# proxy_pass uses ${BACKEND_URL}/ (trailing slash) so nginx strips the
# /api/ location prefix automatically:
#   /api/upload-video → BACKEND_URL/upload-video

server {
    listen ${PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── API proxy → backend VM ────────────────────────────────────────────────
    # ${BACKEND_URL} is substituted to a literal URL by envsubst at startup.
    # With a literal proxy_pass URL and location /api/, nginx strips /api/
    # automatically: /api/upload-video → BACKEND_URL/upload-video
    location /api/ {
        proxy_pass         ${BACKEND_URL}/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        client_max_body_size 4096m;
        proxy_read_timeout   600s;
        proxy_send_timeout   600s;
        proxy_connect_timeout 60s;
    }

    # ── Static assets — aggressive caching ───────────────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    # index.html must never be cached so new deployments take effect immediately
    # without requiring users to hard-refresh.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
    }

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
}
