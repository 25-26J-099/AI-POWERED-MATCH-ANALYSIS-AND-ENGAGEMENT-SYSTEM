MODEL:
  META_ARCHITECTURE: Baseline
  PIXEL_MEAN: [127.5, 127.5, 127.5]
  PIXEL_STD: [127.5, 127.5, 127.5]

  BACKBONE:
    NAME: build_vit_backbone
    DEPTH: base
    FEAT_DIM: 768
    PRETRAIN: True
    PRETRAIN_PATH: ./models/reid/fastreid/weights/jx_vit_base_p16_224-80ecf9dd.pth
    STRIDE_SIZE: [16, 16]
    DROP_PATH_RATIO: 0.1
    DROP_RATIO: 0.0
    ATT_DROP_RATE: 0.0
    SIE_COE: 3.0

  HEADS:
    NAME: EmbeddingHead
    NORM: BN
    WITH_BNNECK: True
    POOL_LAYER: Identity
    NECK_FEAT: before
    CLS_LAYER: Linear
    EMBEDDING_DIM: 0
    NUM_CLASSES: 1

  LOSSES:
    NAME: ["CrossEntropyLoss", "TripletLoss"]

    CE:
      EPSILON: 0.0
      SCALE: 1.0

    TRI:
      MARGIN: 0.0
      HARD_MINING: True
      NORM_FEAT: False
      SCALE: 1.0

INPUT:
  SIZE_TRAIN: [256, 128]
  SIZE_TEST: [256, 128]

  REA:
    ENABLED: False

  FLIP:
    ENABLED: False

  PADDING:
    ENABLED: False

DATALOADER:
  SAMPLER_TRAIN: NaiveIdentitySampler
  NUM_INSTANCE: 4
  NUM_WORKERS: 0

SOLVER:
  AMP:
    ENABLED: False
  OPT: SGD
  MAX_EPOCH: 120
  BASE_LR: 0.008
  WEIGHT_DECAY: 0.0001
  IMS_PER_BATCH: 16

  SCHED: CosineAnnealingLR
  ETA_MIN_LR: 0.000016

  WARMUP_FACTOR: 0.01
  WARMUP_ITERS: 10

  CLIP_GRADIENTS:
    ENABLED: True

  CHECKPOINT_PERIOD: 30

TEST:
  EVAL_PERIOD: 0
  IMS_PER_BATCH: 32

CUDNN_BENCHMARK: False

DATASETS:
  NAMES: ["Market1501"]
  TESTS: ["Market1501"]

OUTPUT_DIR: ./output/fastreid/football_vit
