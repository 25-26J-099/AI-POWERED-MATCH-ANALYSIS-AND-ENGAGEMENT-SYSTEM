# DVC pipeline stages — run with: dvc repro
#
# Each stage generates synthetic training data when the real CSV isn't present,
# so `dvc repro` works out of the box even without a labelled dataset.
#
# To run a specific stage:  dvc repro <stage_name>
# To push all artifacts:    dvc push
# To pull all artifacts:    dvc pull
# To view the DAG:          dvc dag

stages:

  # ── Decision Quality model ────────────────────────────────────────────────
  dq_model:
    cmd: python scripts/train_dq.py
    deps:
      - scripts/train_dq.py
    params:
      - params.yaml:
          - dq.n_samples
          - dq.seed
    outs:
      - data/dq_model.pkl
      - data/dq_scaler.pkl
    metrics:
      - metrics/dq_metrics.json:
          cache: false

  # ── xG model ─────────────────────────────────────────────────────────────
  xg_model:
    cmd: python scripts/train_xg.py
    deps:
      - scripts/train_xg.py
    params:
      - params.yaml:
          - xg.n_samples
          - xg.seed
    outs:
      - model_cache/xg_model.pkl
    metrics:
      - metrics/xg_metrics.json:
          cache: false

  # ── VAEP models (scoring + conceding) ────────────────────────────────────
  vaep_models:
    cmd: python scripts/train_vaep.py
    deps:
      - scripts/train_vaep.py
    params:
      - params.yaml:
          - vaep.n_samples
          - vaep.seed
    outs:
      - model_cache/vaep_score_model_2.pkl
      - model_cache/vaep_concede_model_2.pkl
    metrics:
      - metrics/vaep_metrics.json:
          cache: false

  # ── Style embedding models ────────────────────────────────────────────────
  style_models:
    cmd: python scripts/train_style.py
    deps:
      - scripts/train_style.py
    params:
      - params.yaml:
          - style.n_samples
          - style.n_clusters
          - style.embedding_dim
          - style.epochs
          - style.seed
    outs:
      - model_cache/style_scaler.pkl
      - model_cache/style_autoencoder.pth
      - model_cache/style_cluster_model.pkl
    metrics:
      - metrics/style_metrics.json:
          cache: false

  # ── Audience commentary model ─────────────────────────────────────────────
  audience_model:
    cmd: python scripts/train_audience_model.py
    deps:
      - scripts/train_audience_model.py
      - app/commentary/adaptive.py
    params:
      - params.yaml:
          - audience.seed
    outs:
      - app/commentary/audience_model.json
