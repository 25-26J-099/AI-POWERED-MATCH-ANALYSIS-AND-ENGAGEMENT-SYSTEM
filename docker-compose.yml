# docker-compose.yml — used for local development AND on the GCE VM.
#
# Local dev:  docker compose up --build
# GCE VM:     docker compose pull && docker compose up -d
#
# Required env vars (set in .env at project root for local dev,
# or passed via Secret Manager / VM metadata on GCP):
#   DB_PASSWORD     — PostgreSQL password for appuser
#   GCS_BUCKET      — GCS bucket name (empty = local storage only)
#
# GPU passthrough requires nvidia-container-toolkit on the host.

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: football_analysis
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Create the mlflow database alongside the app database on first boot
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d football_analysis"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s   # give PostgreSQL time to run init-db.sql on first boot

  # ── FastAPI Backend (GPU) ───────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${REGISTRY:-local}/backend:${TAG:-latest}
    restart: unless-stopped
    runtime: nvidia
    env_file:
      - ./backend/.env
    environment:
      # Override DB URL to use the compose service name
      DATABASE_URL: postgresql+asyncpg://appuser:${DB_PASSWORD:-devpassword}@db:5432/football_analysis
      # Containerised paths — override any Windows/macOS paths from .env
      UPLOAD_DIR: /data/uploads
      COMMENTARY_DIR: /data/commentary_videos
      HF_CACHE_DIR: /data/model_cache
      OLLAMA_URL: http://ollama:11434
      FFMPEG_BINARY: ffmpeg
      SOX_BINARY: sox
      GCS_BUCKET: ${GCS_BUCKET:-}
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - appdata:/data
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ── React Frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ${REGISTRY:-local}/frontend:${TAG:-latest}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

  # ── MLflow Tracking Server ──────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.3
    restart: unless-stopped
    command: >
      mlflow server
        --backend-store-uri postgresql://appuser:${DB_PASSWORD:-devpassword}@db:5432/mlflow
        --default-artifact-root ${MLFLOW_ARTIFACT_ROOT:-/mlflow-artifacts}
        --host 0.0.0.0
        --port 5000
    environment:
      # When GCS_BUCKET is set, override artifact root to GCS
      MLFLOW_ARTIFACT_ROOT: ${GCS_BUCKET:+gs://${GCS_BUCKET}/mlflow}
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/gcp-key.json
    volumes:
      - mlflowdata:/mlflow-artifacts
      # Mount GCP service-account key if present (for GCS artifact uploads)
      - ${GCP_KEY_PATH:-/dev/null}:/secrets/gcp-key.json:ro
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

  # ── Ollama (local LLM for commentary) ──────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    runtime: nvidia
    ports:
      - "11434:11434"
    volumes:
      - ollamadata:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  pgdata:
  appdata:
  mlflowdata:
  ollamadata:
