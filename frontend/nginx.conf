# nginx.conf — served as /etc/nginx/templates/default.conf.template
# Cloud Run sets PORT env var; nginx's docker-entrypoint runs envsubst on this
# file before starting, so ${PORT} is replaced with the actual port value.
# Using a variable for proxy_pass backend defers DNS resolution to request time,
# preventing nginx from crashing on startup when "backend" is not resolvable
# (e.g. in Cloud Run where no backend container exists in the same network).

server {
    listen ${PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # DNS resolver — required when using a variable for proxy_pass
    resolver 8.8.8.8 valid=30s ipv6=off;

    # ── API proxy → backend VM ────────────────────────────────────────────────
    # Strip the /api/ prefix before forwarding: /api/upload-video → /upload-video
    # BACKEND_URL injected via envsubst at startup (nginx template feature).
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        set $backend_url ${BACKEND_URL};
        proxy_pass         $backend_url;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Large video uploads — 4 GB body limit, 10-minute timeout
        client_max_body_size 4096m;
        proxy_read_timeout   600s;
        proxy_send_timeout   600s;
        proxy_connect_timeout 60s;
    }

    # ── Static assets — aggressive caching ───────────────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── SPA fallback — all other routes go to index.html ─────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
}
